name: Run Tests

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping" --health-interval=10s
          --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions:
            dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath,
            intl, fileinfo
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Dependencies
        run:
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress
          --prefer-dist

      - name: Generate Key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Run Migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: php artisan migrate --force

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=2G

      - name: Execute tests (Pest)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: ./vendor/bin/pest
  go-tests:
    runs-on: ubuntu-latest
    # 作業ディレクトリを指定します
    defaults:
      run:
        working-directory: ./ai-recipe-service

    steps:
      # リポジトリのコードをチェックアウト
      - uses: actions/checkout@v4

      # Go環境のセットアップとキャッシュの設定
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable" # 常に最新の安定版Goを使用
          cache-dependency-path: ai-recipe-service/go.sum

      # Goモジュールのダウンロード
      - name: Install Dependencies
        run: go mod download

      # Makefile を使ってテストを実行
      - name: Run Go Tests
        run: make test
