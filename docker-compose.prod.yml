services:
    tubechef-web:
        image: nginx:alpine
        ports:
            - "80:80"
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./public:/var/www/html/public
        depends_on:
            - tubechef-app
        networks:
            - tubechef-network
    tubechef-app:
        build:
            context: .
            dockerfile: Dockerfile.prod
        env_file:
            - .env
        networks:
            - tubechef-network
        depends_on:
            - tubechef-mysql
            - tubechef-redis
    tubechef-worker:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                WWWGROUP: 1000
        command: php artisan queue:work --tries=3
        volumes:
            - ".:/var/www/html"
        networks:
            - tubechef-network
        depends_on:
            - tubechef-redis
    ai-recipe-service:
        build:
            context: ./ai-recipe-service
            dockerfile: Dockerfile
        env_file:
            - .env
        networks:
            - tubechef-network
    tubechef-mysql:
        image: "mysql/mysql-server:8.0"
        env_file:
            - .env
        volumes:
            - "tubechef-mysql-data:/var/lib/mysql"
        networks:
            - tubechef-network
    tubechef-redis:
        image: "redis:alpine"
        volumes:
            - "tubechef-redis-data:/data"
        networks:
            - tubechef-network

networks:
    tubechef-network:
        driver: bridge

volumes:
    tubechef-mysql-data:
        driver: local
    tubechef-redis-data:
        driver: local
